<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' https:; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'" />
  <title>Eco-système</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="bar">
    <div id="nav">

  <div id="views"></div>
